<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="pet.css" />
    <title>LLMPET</title>
  </head>
  <body>
    <div id="stage">
      <!-- 气泡播报 -->
      <div id="bubble" class="bubble hidden">
        <span id="bubble-text"></span>
      </div>

      <!-- Needs Input / 授权卡片：Claude 要选择/授权/输入时在这处理 -->
      <div id="ask" class="ask hidden">
        <div class="ask-head">
          <div class="ask-label" id="ask-label">Needs Input</div>
          <div class="ask-sess" id="ask-sess"></div>
        </div>
        <div class="ask-scroll" id="ask-scroll">
          <div class="ask-card">
            <div class="ask-qhead" id="ask-qhead"></div>
            <div class="ask-q" id="ask-q"></div>
            <div class="ask-hint" id="ask-hint"></div>
            <div class="ask-opts" id="ask-opts"></div>
            <div class="ask-other hidden" id="ask-input-row">
              <input id="ask-text" type="text" placeholder="输入自定义回答…" />
            </div>
          </div>
        </div>
        <div class="ask-toolbar">
          <div class="ask-page" id="ask-page"></div>
          <div class="ask-foot" id="ask-foot">
            <button class="ask-btn" id="ask-back">Back</button>
            <button class="ask-btn primary" id="ask-submit">Submit Answer</button>
          </div>
          <button class="ask-term" id="ask-term">💬 Go to Terminal</button>
        </div>
      </div>

      <!-- 思考指示器（thinking 状态：填补 Claude 在想、没输出的空档） -->
      <div id="think" class="think">
        <span class="td">💭</span>
        <span class="think-label">思考中</span>
        <span class="dots"><i></i><i></i><i></i></span>
      </div>

      <!-- 睡觉指示器（逐渐变大往上飘的 z z Z，醒目） -->
      <div id="sleep" class="sleep">
        <span class="z z1">z</span>
        <span class="z z2">z</span>
        <span class="z z3">Z</span>
      </div>


      <!-- 点击章鱼弹出的泡泡菜单（JS 动态摆放在章鱼四周） -->
      <div id="radial" class="radial hidden"></div>

      <!-- 按工具动作时头顶飘出的道具 emoji -->
      <div id="prop" class="prop"></div>
      <!-- 表情包：选择后固定出现在桌宠右侧，并同步播放配置的语音包 -->
      <div id="meme-player" class="meme-player hidden" aria-live="polite">
        <img id="meme-image" alt="" draggable="false" />
        <div id="meme-caption" class="meme-caption"></div>
      </div>
      <!-- 召唤 subagent 时弹出的小分身 -->
      <div id="sidekick" class="sidekick">🐙</div>

      <!-- 形象二：Claude Code 像素小怪兽 -->
      <div id="pixel" class="pixel idle">
        <div class="pixel-zzz">💤</div>
        <div class="pixel-sprite"></div>
        <div class="pixel-ground"></div>
      </div>

      <!-- 多会话状态点：每个点 = 一个并行任务，颜色 = 状态 -->
      <div id="sessions" class="sessions"></div>

      <!-- 形象四：图标款小章鱼 —— 直接用 tray 图标同一套画法高清重渲的图，100% 还原 -->
      <div id="mascot" class="mascot idle">
        <img id="mascot-img" src="../assets/mascot.png" alt="mascot" draggable="false" />
      </div>

      <!-- 形象五：月薪喵（猫 meme 表情包皮肤，每个状态一张 GIF，动效由 GIF 自带） -->
      <div id="cat" class="cat idle">
        <img id="cat-img" src="../assets/cat/cat-idle.gif" alt="cat" draggable="false" />
      </div>

      <!-- 常驻小额度条 -->
      <div id="chip" class="chip">
        <span id="chip-cost">$0.000</span>
        <span class="chip-sep">·</span>
        <span id="chip-window" title="近5小时消耗">5h $0.000</span>
      </div>

      <!-- 双宠模式的名牌：这只宠盯的是哪个后端（单宠模式隐藏） -->
      <div id="agent-tag" class="agent-tag hidden"></div>

      <!-- 记事本：有待办时章鱼举起它，点击看 todolist + 操作 -->
      <div id="notepad" class="notepad hidden" title="待办清单">
        <span class="np-icon">📋</span>
        <span id="np-badge" class="np-badge"></span>
      </div>

      <!-- 会话列表 HUD：左键弹出，每行 状态点 + 图标 + 会话名 + 上下文用量% -->
      <div id="sesslist" class="sesslist hidden">
        <div class="sl-top">
          <button id="sl-back" class="sl-back hidden" title="返回会话">‹</button>
          <span class="sl-title" id="sl-title">🗂️ 会话</span>
          <span class="sl-sub" id="sl-sub"></span>
          <span class="sl-close" id="sl-close" title="关闭">✕</span>
        </div>
        <div id="sl-session-view">
          <div class="sl-scroll" id="sl-rows"></div>
          <div class="sl-foot">
            <button id="sl-new">🚀 新开 Claude</button>
            <button id="sl-new-codex" class="hidden">🛰️ 新开 Codex</button>
            <button id="sl-panel">📊 详情</button>
          </div>
        </div>
        <div id="sl-meme-view" class="sl-meme-view hidden">
          <div id="sl-meme-session" class="sl-meme-session"></div>
          <div id="sl-meme-grid" class="sl-meme-grid"></div>
          <div id="sl-meme-status" class="sl-meme-status"></div>
        </div>
      </div>

      <!-- 记事本弹层：行动清单（需要处理的事项 + 待办）+ 操作 -->
      <div id="todopop" class="todopop hidden">
        <div class="tp-top">
          <span class="tp-title" id="tp-title">🗒️ 行动清单</span>
          <span class="tp-prog" id="tp-prog"></span>
          <span class="tp-close" id="tp-close" title="关闭">✕</span>
        </div>
        <div class="tp-scroll">
          <div class="tp-sec" id="tp-act-sec">
            <div class="tp-sec-h">🔔 需要你处理</div>
            <div id="tp-acts"></div>
          </div>
          <div class="tp-sec" id="tp-todo-sec">
            <div class="tp-sec-h">📋 待办</div>
            <div class="tp-list" id="tp-list"></div>
          </div>
        </div>
        <div class="tp-ops">
          <button data-op="claude">💬 唤起 Claude</button>
          <button data-op="panel">📊 详情</button>
          <button data-op="log">📄 日志</button>
        </div>
      </div>
    </div>

    <script src="../shared/states.js"></script>
    <script src="icons.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
